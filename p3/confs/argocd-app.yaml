apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: wil-playground
  namespace: argocd
spec:
  project: default
  
  # Source: Your application manifests
  # For local testing, we'll use a local path
  # In production, this would point to a git repository
  source:
    repoURL: ${REPO_URL}
    targetRevision: HEAD
    path: .
  
  # Destination: Where to deploy
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  
  # Sync policy
  syncPolicy:
    automated:
      prune: true       # Remove resources that are no longer defined
      selfHeal: true    # Automatically sync when differences detected
      allowEmpty: false
    syncOptions:
    - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
