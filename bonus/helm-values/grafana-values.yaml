# Grafana Configuration

adminPassword: "admin123"
adminUser: "admin"

service:
  type: NodePort
  nodePort: 30300

persistence:
  enabled: true
  size: 2Gi
  storageClassName: local-path

# Point to the Prometheus service created by kube-prometheus-stack
datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
    - name: Prometheus
      type: prometheus
      url: http://prometheus-kube-prometheus-prometheus.monitoring.svc:9090
      access: proxy
      isDefault: true

dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
    - name: 'default'
      orgId: 1
      folder: ''
      type: file
      disableDeletion: false
      updateIntervalSeconds: 10
      allowUiUpdates: true
      options:
        path: /var/lib/grafana/dashboards/default

dashboards:
  default: {}
